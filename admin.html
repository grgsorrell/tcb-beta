<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCB Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --n1:#0B1120; --n2:#111827; --n3:#16213e; --n4:#1E3A5F; --n5:#2A5298;
  --gold:#d4a574; --red:#e87070; --green:#82b386; --blue:#6b9cd8; --purple:#9b8ec4;
  --t1:#e8e8e8; --t2:#94A3B8; --t3:#64748B;
  --br:#1f2a44; --br2:#293656;
  --font-d:'Playfair Display',serif; --font-b:'DM Sans',system-ui,sans-serif;
}
*{box-sizing:border-box}
body{margin:0;font-family:var(--font-b);background:var(--n1);color:var(--t1);font-size:13px;line-height:1.55;}
.wrap{max-width:1200px;margin:0 auto;padding:24px;}
header{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--br);padding-bottom:12px;margin-bottom:20px;}
header h1{font-family:var(--font-d);font-weight:700;font-size:22px;margin:0;color:var(--gold);}
header .crumbs{color:var(--t2);font-size:12px;}
header .crumbs a{color:var(--blue);text-decoration:none;}
header .crumbs a:hover{text-decoration:underline;}
header .signedin{color:var(--t3);font-size:11px;}
.panel{background:var(--n2);border:1px solid var(--br);border-radius:10px;padding:18px;margin-bottom:18px;}
h2{font-family:var(--font-d);font-size:16px;color:var(--gold);margin:0 0 12px;}
table{width:100%;border-collapse:collapse;}
th,td{text-align:left;padding:10px 8px;border-bottom:1px solid var(--br);font-size:12.5px;}
th{color:var(--t3);font-weight:600;text-transform:uppercase;font-size:10.5px;letter-spacing:.5px;}
tbody tr:hover{background:rgba(43,82,152,.18);cursor:pointer;}
.badge{display:inline-block;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-left:6px;}
.badge.admin{background:rgba(212,165,116,.18);color:var(--gold);border:1px solid rgba(212,165,116,.4);}
.badge.beta{background:rgba(155,142,196,.18);color:var(--purple);border:1px solid rgba(155,142,196,.4);}
.badge.disabled{background:rgba(232,112,112,.18);color:var(--red);border:1px solid rgba(232,112,112,.4);}
.badge.active{background:rgba(130,179,134,.16);color:var(--green);border:1px solid rgba(130,179,134,.36);}
.kv{display:grid;grid-template-columns:160px 1fr;gap:6px 14px;font-size:12.5px;}
.kv .k{color:var(--t3);}
.kv .v{color:var(--t1);}
.cost-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.cost-card{background:var(--n3);border:1px solid var(--br);border-radius:8px;padding:14px;}
.cost-card .lbl{color:var(--t3);font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;}
.cost-card .val{font-family:var(--font-d);font-size:22px;color:var(--gold);margin-top:4px;}
button.primary{background:var(--n5);color:var(--t1);border:1px solid var(--n5);border-radius:6px;padding:8px 14px;cursor:pointer;font-family:var(--font-b);font-size:12.5px;font-weight:600;}
button.primary:hover{background:var(--n4);}
button.danger{background:rgba(232,112,112,.85);color:#fff;border:1px solid var(--red);border-radius:6px;padding:10px 18px;cursor:pointer;font-family:var(--font-b);font-size:13px;font-weight:600;}
button.danger:hover{background:var(--red);}
button.success{background:rgba(130,179,134,.85);color:#fff;border:1px solid var(--green);border-radius:6px;padding:10px 18px;cursor:pointer;font-family:var(--font-b);font-size:13px;font-weight:600;}
button.success:hover{background:var(--green);}
button:disabled{opacity:.45;cursor:not-allowed;}
button.ghost{background:transparent;color:var(--t2);border:1px solid var(--br2);border-radius:6px;padding:8px 14px;cursor:pointer;font-family:var(--font-b);font-size:12.5px;}
button.ghost:hover{background:var(--n3);color:var(--t1);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000;}
.modal{background:var(--n2);border:1px solid var(--br);border-radius:10px;padding:24px;max-width:480px;width:90%;}
.modal h3{font-family:var(--font-d);font-size:18px;color:var(--gold);margin:0 0 12px;}
.modal p{color:var(--t1);margin:0 0 18px;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;}
.muted{color:var(--t3);}
.error{color:var(--red);background:rgba(232,112,112,.1);border:1px solid rgba(232,112,112,.3);border-radius:8px;padding:14px;}
.login{max-width:360px;margin:80px auto;background:var(--n2);border:1px solid var(--br);border-radius:10px;padding:24px;}
.login input{width:100%;padding:10px;background:var(--n1);border:1px solid var(--br2);border-radius:6px;color:var(--t1);font-family:var(--font-b);margin-bottom:10px;}
.login button{width:100%;}
.tooltip{position:relative;display:inline-block;}
.tooltip .tip{visibility:hidden;background:var(--n3);color:var(--t1);text-align:center;border-radius:6px;padding:6px 10px;position:absolute;z-index:1;bottom:120%;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:11px;border:1px solid var(--br2);}
.tooltip:hover .tip{visibility:visible;}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--br2);border-top-color:var(--gold);border-radius:50%;animation:s 0.8s linear infinite;}
@keyframes s{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div id="root"></div>
<script>
const API = 'https://candidate-toolbox-secretary2.grgsorrell.workers.dev';
const SS_KEY = 'tcb_session';

function getSession(){ try { return localStorage.getItem(SS_KEY) || ''; } catch(e){ return ''; } }
function setSession(s){ try { localStorage.setItem(SS_KEY, s); } catch(e){} }

function escapeHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function fmtMoney(n){ return '$' + (Number(n)||0).toFixed(2); }

function fmtRelative(iso){
  if(!iso) return 'never';
  const t = Date.parse(iso.replace(' ', 'T') + (iso.includes('Z') ? '' : 'Z'));
  if(isNaN(t)) return iso;
  const diff = (Date.now() - t) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + ' min ago';
  if (diff < 86400) return Math.floor(diff/3600) + ' hr ago';
  if (diff < 86400*2) return 'yesterday';
  if (diff < 86400*7) return Math.floor(diff/86400) + ' days ago';
  if (diff < 86400*30) return Math.floor(diff/(86400*7)) + ' weeks ago';
  return Math.floor(diff/(86400*30)) + ' months ago';
}

function fmtAbsolute(iso){
  if(!iso) return 'never';
  const d = new Date(iso.replace(' ', 'T') + (iso.includes('Z') ? '' : 'Z'));
  if (isNaN(d.getTime())) return iso;
  return d.toISOString().replace('T',' ').slice(0,19) + ' UTC';
}

const BETA_USERNAMES = ['greg', 'shannan', 'cjc', 'jerry'];

async function api(path, opts){
  opts = opts || {};
  opts.headers = Object.assign({'Content-Type':'application/json'}, opts.headers || {});
  const sess = getSession();
  if (sess) opts.headers['Authorization'] = 'Bearer ' + sess;
  const r = await fetch(API + path, opts);
  if (r.status === 403) {
    const body = await r.json().catch(() => ({}));
    if (body.error === 'admin_required') {
      return { ok: false, status: 403, body };
    }
    if (body.error === 'account_disabled') {
      setSession('');
      renderLogin('Your account has been disabled.');
      return { ok: false, status: 403, body };
    }
    return { ok: false, status: 403, body };
  }
  if (!r.ok) {
    const body = await r.json().catch(() => ({}));
    return { ok: false, status: r.status, body };
  }
  return { ok: true, body: await r.json() };
}

// Hash routing: '' / '#' → list, '#user/{id}' → detail
function currentRoute() {
  const h = (window.location.hash || '').replace(/^#/, '');
  const m = h.match(/^user\/(.+)$/);
  if (m) return { name: 'detail', userId: m[1] };
  return { name: 'list' };
}
function navigate(hash) { window.location.hash = hash; }

window.addEventListener('hashchange', () => render());

async function render(){
  const sess = getSession();
  if (!sess) return renderLogin();
  // Verify session is still valid + admin by fetching the users list.
  const route = currentRoute();
  if (route.name === 'list') return renderList();
  if (route.name === 'detail') return renderDetail(route.userId);
}

function renderLogin(errMsg){
  document.getElementById('root').innerHTML =
    '<div class="login">' +
      '<h2 style="text-align:center;">TCB Admin</h2>' +
      (errMsg ? '<div class="error" style="margin-bottom:14px;">' + escapeHtml(errMsg) + '</div>' : '') +
      '<input id="u" placeholder="username" autofocus>' +
      '<input id="p" type="password" placeholder="password">' +
      '<button class="primary" onclick="doLogin()">Sign in</button>' +
      '<div id="login-err" style="color:var(--red);font-size:11px;margin-top:8px;text-align:center;"></div>' +
    '</div>';
  document.getElementById('p').addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });
}

async function doLogin(){
  const u = document.getElementById('u').value.trim();
  const p = document.getElementById('p').value;
  const errEl = document.getElementById('login-err');
  errEl.textContent = '';
  try {
    const r = await fetch(API + '/auth/beta-login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username: u, password: p})
    });
    const body = await r.json();
    if (!r.ok || !body.success) {
      errEl.textContent = body.message || body.error || 'Login failed';
      return;
    }
    setSession(body.sessionId);
    render();
  } catch (e) {
    errEl.textContent = 'Network error';
  }
}

function logout(){
  setSession('');
  renderLogin();
}

async function renderList(){
  document.getElementById('root').innerHTML =
    '<div class="wrap"><header>' +
      '<div><h1>TCB Admin</h1><div class="crumbs">Users</div></div>' +
      '<div><span class="signedin">Signed in</span> <button class="ghost" onclick="logout()">Sign out</button></div>' +
    '</header>' +
    '<div class="panel"><div style="display:flex;align-items:center;gap:8px;"><span class="spin"></span> Loading users…</div></div></div>';

  const r = await api('/api/admin/users');
  if (!r.ok) {
    document.getElementById('root').innerHTML =
      '<div class="wrap"><header><div><h1>TCB Admin</h1></div><div><button class="ghost" onclick="logout()">Sign out</button></div></header>' +
      '<div class="panel"><div class="error">' + escapeHtml((r.body && (r.body.message || r.body.error)) || 'Access denied') + '</div></div></div>';
    return;
  }
  const users = r.body.users || [];
  const rows = users.map(u => {
    const name = u.full_name || u.username || u.email || u.id;
    const isBeta = BETA_USERNAMES.indexOf((u.username || '').toLowerCase()) >= 0;
    const statusBadges = [];
    if (u.is_admin === 1) statusBadges.push('<span class="badge admin">Admin</span>');
    if (u.is_disabled === 1) statusBadges.push('<span class="badge disabled">Disabled</span>');
    if (isBeta) statusBadges.push('<span class="badge beta">Beta</span>');
    if (u.is_admin !== 1 && u.is_disabled !== 1) statusBadges.push('<span class="badge active">Active</span>');
    return '<tr onclick="navigate(\'#user/' + escapeHtml(u.id) + '\')">' +
      '<td>' + escapeHtml(name) + '</td>' +
      '<td>' + escapeHtml(u.email || '') + '</td>' +
      '<td title="' + escapeHtml(fmtAbsolute(u.last_login)) + '">' + escapeHtml(fmtRelative(u.last_login)) + '</td>' +
      '<td>' + fmtMoney(u.total_cost_lifetime) + '</td>' +
      '<td>' + fmtMoney(u.total_cost_today) + '</td>' +
      '<td>' + statusBadges.join(' ') + '</td>' +
      '</tr>';
  }).join('');
  document.getElementById('root').innerHTML =
    '<div class="wrap"><header>' +
      '<div><h1>TCB Admin</h1><div class="crumbs">Users (' + users.length + ')</div></div>' +
      '<div><button class="ghost" onclick="logout()">Sign out</button></div>' +
    '</header>' +
    '<div class="panel"><table>' +
      '<thead><tr><th>Name</th><th>Email</th><th>Last login</th><th>Total cost</th><th>Today</th><th>Status</th></tr></thead>' +
      '<tbody>' + (rows || '<tr><td colspan="6" class="muted">No users.</td></tr>') + '</tbody>' +
    '</table></div></div>';
}

async function renderDetail(userId){
  document.getElementById('root').innerHTML =
    '<div class="wrap"><header>' +
      '<div><h1>TCB Admin</h1><div class="crumbs"><a href="#">Users</a> / Detail</div></div>' +
      '<div><button class="ghost" onclick="logout()">Sign out</button></div>' +
    '</header>' +
    '<div class="panel"><div style="display:flex;align-items:center;gap:8px;"><span class="spin"></span> Loading…</div></div></div>';

  const r = await api('/api/admin/users/' + encodeURIComponent(userId));
  if (!r.ok) {
    document.getElementById('root').innerHTML =
      '<div class="wrap"><header><div><h1>TCB Admin</h1><div class="crumbs"><a href="#">Users</a> / Detail</div></div></header>' +
      '<div class="panel"><div class="error">' + escapeHtml((r.body && (r.body.message || r.body.error)) || 'Failed to load') + '</div></div></div>';
    return;
  }
  const p = r.body.profile;
  const cs = r.body.cost_summary || {};
  const isBeta = BETA_USERNAMES.indexOf((p.username || '').toLowerCase()) >= 0;
  const name = p.full_name || p.username || p.email || p.id;

  function breakdownTable(rows){
    if (!rows || !rows.length) return '<div class="muted" style="padding:8px 0;">No usage in this window.</div>';
    return '<table><thead><tr><th>Category</th><th>Calls</th><th>Cost</th></tr></thead><tbody>' +
      rows.map(r => '<tr><td>' + escapeHtml(r.category) + '</td><td>' + (r.calls || 0) + '</td><td>' + fmtMoney(r.total) + '</td></tr>').join('') +
      '</tbody></table>';
  }

  let actionHtml = '';
  if (p.is_admin === 1) {
    actionHtml = '<span class="tooltip"><button class="danger" disabled>Disable Account</button><span class="tip">Admins cannot be disabled</span></span>';
  } else if (p.is_disabled === 1) {
    actionHtml = '<button class="success" onclick="confirmEnable(\'' + escapeHtml(p.id) + '\', \'' + escapeHtml(name) + '\')">Re-enable Account</button>';
  } else {
    actionHtml = '<button class="danger" onclick="confirmDisable(\'' + escapeHtml(p.id) + '\', \'' + escapeHtml(name) + '\')">Disable Account</button>';
  }

  document.getElementById('root').innerHTML =
    '<div class="wrap"><header>' +
      '<div><h1>TCB Admin</h1><div class="crumbs"><a href="#">Users</a> / ' + escapeHtml(name) + '</div></div>' +
      '<div><button class="ghost" onclick="logout()">Sign out</button></div>' +
    '</header>' +
    '<div class="panel"><h2>Profile</h2>' +
      '<div class="kv">' +
        '<div class="k">Name</div><div class="v">' + escapeHtml(name) + '</div>' +
        '<div class="k">Email</div><div class="v">' + escapeHtml(p.email || '') + '</div>' +
        '<div class="k">Username</div><div class="v">' + escapeHtml(p.username || '—') + '</div>' +
        '<div class="k">Signup</div><div class="v">' + escapeHtml(fmtAbsolute(p.created_at)) + '</div>' +
        '<div class="k">Last login</div><div class="v">' + escapeHtml(fmtAbsolute(p.last_login)) + ' <span class="muted">(' + escapeHtml(fmtRelative(p.last_login)) + ')</span></div>' +
        '<div class="k">Beta</div><div class="v">' + (isBeta ? '<span class="badge beta">Beta user</span>' : 'no') + '</div>' +
        '<div class="k">Admin</div><div class="v">' + (p.is_admin === 1 ? '<span class="badge admin">Admin</span>' : 'no') + '</div>' +
        '<div class="k">Disabled</div><div class="v">' + (p.is_disabled === 1 ? '<span class="badge disabled">Disabled</span>' : 'no') + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="panel"><h2>Cost summary</h2>' +
      '<div class="cost-grid">' +
        '<div class="cost-card"><div class="lbl">Today</div><div class="val">' + fmtMoney(cs.today) + '</div></div>' +
        '<div class="cost-card"><div class="lbl">Last 7 days</div><div class="val">' + fmtMoney(cs.last_7d) + '</div></div>' +
        '<div class="cost-card"><div class="lbl">Lifetime</div><div class="val">' + fmtMoney(cs.lifetime) + '</div></div>' +
      '</div>' +
    '</div>' +
    '<div class="panel"><h2>Today — by category</h2>' + breakdownTable(r.body.breakdown_today) + '</div>' +
    '<div class="panel"><h2>Last 7 days — by category</h2>' + breakdownTable(r.body.breakdown_7d) + '</div>' +
    '<div class="panel"><h2>Lifetime — by category</h2>' + breakdownTable(r.body.breakdown_lifetime) + '</div>' +
    '<div class="panel"><h2>Account action</h2>' +
      '<div style="margin-top:8px;">' + actionHtml + '</div>' +
    '</div>' +
    '</div>';
}

function confirmDisable(userId, name){
  showModal({
    title: 'Disable account?',
    body: 'Disable account for <strong>' + escapeHtml(name) + '</strong>? They\'ll be logged out and unable to access TCB.',
    confirmLabel: 'Confirm Disable',
    confirmClass: 'danger',
    onConfirm: async () => {
      const r = await api('/api/admin/users/' + encodeURIComponent(userId) + '/disable', { method: 'POST' });
      hideModal();
      if (!r.ok) alert((r.body && (r.body.message || r.body.error)) || 'Failed');
      renderDetail(userId);
    }
  });
}

function confirmEnable(userId, name){
  showModal({
    title: 'Re-enable account?',
    body: 'Re-enable account for <strong>' + escapeHtml(name) + '</strong>? They\'ll be able to log in and use TCB again.',
    confirmLabel: 'Confirm Re-enable',
    confirmClass: 'success',
    onConfirm: async () => {
      const r = await api('/api/admin/users/' + encodeURIComponent(userId) + '/enable', { method: 'POST' });
      hideModal();
      if (!r.ok) alert((r.body && (r.body.message || r.body.error)) || 'Failed');
      renderDetail(userId);
    }
  });
}

let _modalCb = null;
function showModal(opts){
  _modalCb = opts.onConfirm;
  const o = document.createElement('div');
  o.id = 'modal-overlay';
  o.className = 'modal-overlay';
  o.innerHTML =
    '<div class="modal">' +
      '<h3>' + escapeHtml(opts.title) + '</h3>' +
      '<p>' + opts.body + '</p>' +
      '<div class="modal-actions">' +
        '<button class="ghost" onclick="hideModal()">Cancel</button>' +
        '<button class="' + (opts.confirmClass || 'primary') + '" onclick="_modalConfirm()">' + escapeHtml(opts.confirmLabel || 'Confirm') + '</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(o);
}
function hideModal(){
  const o = document.getElementById('modal-overlay');
  if (o) o.remove();
  _modalCb = null;
}
function _modalConfirm(){ if (_modalCb) _modalCb(); }

render();
</script>
</body>
</html>
